<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Browser Research Panel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px
        }

        .log {
            border: 1px solid #ddd;
            padding: 8px;
            height: 300px;
            overflow: auto
        }
    </style>
</head>

<body>
    <h2>Browser Research Panel</h2>
    <input id="query" style="width:60%" placeholder="Enter research query" />
    <button id="start">Start Research</button>
    <div class="log" id="log"></div>

    <script>
        const logEl = document.getElementById('log')
        function log(msg) { const p = document.createElement('div'); p.textContent = msg; logEl.appendChild(p); logEl.scrollTop = logEl.scrollHeight }

        // This demo previously opened a raw WebSocket connection for quick research testing.
        // For stability and production-readiness, use the app's centralized RealtimeManager instead.
        log('Realtime demo disabled - use main app or RealtimeManager for websocket interactions')

        document.getElementById('start').onclick = async () => {
            const q = document.getElementById('query').value
            if (!q) return alert('enter query')
            log('Starting research: ' + q)
            // call backend API to trigger research (demo mode)
            try {
                await fetch('/api/research', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ query: q }) })
                log('Research request submitted via HTTP POST')
            } catch (err) {
                log('Failed to submit research request: ' + String(err))
            }
        }
    </script>
</body>

</html>
